name: CRD-Lite-Final
on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'Code'
        required: true
      crd_pin:
        description: 'PIN'
        required: true
        default: '123456'

jobs:
  start:
    runs-on: windows-latest
    steps:
    - shell: pwsh
      run: |
        # 1. Качаем и ставим
        $msi = "$env:TEMP\crd.msi"
        Invoke-WebRequest "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msi
        Start-Process msiexec.exe -ArgumentList "/i $msi /qn" -Wait

        # 2. Запуск (используем переменные окружения, чтобы избежать каши с кавычками)
        $CODE = "${{ github.event.inputs.crd_code }}"
        $PIN = "${{ github.event.inputs.crd_pin }}"
        $EXE = "${Env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"

        Write-Host "Попытка запуска хоста..."
        
        # Запуск БЕЗ лишних оберток
        & $EXE --code=$CODE --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME --pin=$PIN

        # 3. Проверка и ожидание
        Write-Host "Если выше нет ошибок — проверяй список устройств."
        while($true) { Start-Sleep -Seconds 60 }
